<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="open-easy-web: KUSANAGI-like deploy/ops tool (Rust -> WebAssembly)" />
    <title>open-easy-web</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f8;
        --bg-raised: #ffffff;
        --fg: #1a1d23;
        --muted: #6b7280;
        --accent: #2f6fed;
        --border: #d9dce1;
        --radius: 0.375rem;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14161a;
          --bg-raised: #1a1d23;
          --fg: #e6e6e6;
          --muted: #9aa0a6;
          --accent: #4f8cff;
          --border: #2a2d33;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        background: var(--bg);
        color: var(--fg);
      }
      #app-root {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }
      header h1 { margin: 0 0 0.25rem; letter-spacing: -0.01em; }
      .muted { color: var(--muted); }
      section {
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.1rem;
        margin-top: 1rem;
      }
      label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
      input, select {
        display: block;
        width: 100%;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.5rem 0.6rem;
        font: inherit;
      }
      input:focus, select:focus { outline: none; border-color: var(--accent); }
      .buttons { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
      /* タップ操作に適したサイズ(最小44px x 44px、Web標準のタッチターゲット推奨) */
      button {
        cursor: pointer;
        background: var(--bg);
        color: var(--accent);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.5rem 1rem;
        margin-right: 0.5rem;
        font: inherit;
        font-weight: 500;
        min-height: 44px;
        min-width: 44px;
      }
      input, select { min-height: 44px; }
      button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button:disabled:hover { background: var(--bg); color: var(--accent); border-color: var(--border); }
      #status { font-size: 0.9rem; }

      /* サイト管理 */
      .site-card {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.7rem 0.9rem;
        margin-bottom: 0.6rem;
      }
      .site-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
      .site-card-title { font-weight: 600; }
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border-radius: 999px;
        padding: 0.1rem 0.5rem;
        margin-left: 0.4rem;
        vertical-align: middle;
      }
      .site-card-meta, .site-card-stack { font-size: 0.82rem; margin-top: 0.2rem; }
      .site-card-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; flex-shrink: 0; max-width: 14rem; }
      .site-card-actions button { margin: 0; padding: 0.35rem 0.7rem; font-size: 0.85rem; }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem 1rem;
      }
      .form-grid-full { grid-column: 1 / -1; }
      @media (max-width: 560px) {
        .form-grid { grid-template-columns: 1fr; }
      }
      button.secondary { color: var(--muted); }
      section h2 { font-size: 1rem; margin: 0 0 0.5rem; }

      .test-result { font-size: 0.8rem; align-self: center; }
      .hidden { display: none; }

      /* スマホ縦画面向けレスポンシブ対応(Mobile portrait responsive layout) */
      @media (max-width: 600px) {
        #app-root { padding: 1rem 0.75rem 3rem; }
        header h1 { font-size: 1.25rem; }
        section { padding: 0.85rem 0.8rem; }
        .site-card { flex-direction: column; }
        .site-card-actions { max-width: 100%; width: 100%; }
        .site-card-actions button { flex: 1 1 auto; }
        .buttons { flex-direction: column; align-items: stretch; }
        .buttons button { margin-right: 0; width: 100%; }
        table { display: block; overflow-x: auto; }
      }
    </style>
  </head>
  <body>
    <main id="app-root">Loading…</main>
    <script type="module">
      import init from "./pkg/open_easy_web.js";
      init();
    </script>
  </body>
</html>
